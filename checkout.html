<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 30px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
}

.loading {
  text-align: center;
  margin-top: 15px;
  display: none;
}
</style>
</head>

<body>

<div class="card">
  <h2>💳 Secure Payment</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">

  <select id="amount">
    <option value="3000">₦3,000</option>
    <option value="5000">₦5,000</option>
    <option value="10000">₦10,000</option>
  </select>

  <button onclick="payNow()">Pay Securely</button>

  <div class="loading" id="loading">Processing payment...</div>
</div>

<script>
async function payNow() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;

  if (!name || !email || !amount) {
    alert("Please fill all fields");
    return;
  }

  document.getElementById("loading").style.display = "block";

  try {
    const res = await fetch("https://natural-farm-produces.onrender.com/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, amount })
    });

    const html = await res.text();

    // 🔥 THIS IS WHAT TRIGGERS QUICKTELLER REDIRECT
    document.open();
    document.write(html);
    document.close();

  } catch (error) {
    alert("Payment failed. Try again.");
    console.error(error);
  }
}
</script>

</body>
</html>
